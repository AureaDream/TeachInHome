<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 - 家教接单平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0052d9 0%, #0040a3 100%);
        }
        .btn-primary {
            background: #0052d9;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #0040a3;
            transform: translateY(-1px);
        }
        .input-focus:focus {
            border-color: #0052d9;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <!-- 状态栏 -->
    <div class="gradient-bg h-12 flex items-center justify-center">
        <div class="text-white text-sm font-medium">9:41</div>
        <div class="ml-auto flex items-center space-x-1 pr-4">
            <div class="w-4 h-2 bg-white rounded-sm opacity-60"></div>
            <div class="w-4 h-2 bg-white rounded-sm opacity-80"></div>
            <div class="w-4 h-2 bg-white rounded-sm"></div>
            <div class="w-6 h-3 border border-white rounded-sm">
                <div class="w-4 h-2 bg-white rounded-sm ml-0.5 mt-0.5"></div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 flex flex-col">
        <!-- 头部装饰 -->
        <div class="gradient-bg h-32 relative">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mb-2 mx-auto">
                        <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/>
                        </svg>
                    </div>
                    <h1 class="text-white text-lg font-semibold">家教接单平台</h1>
                </div>
            </div>
        </div>

        <!-- 登录表单 -->
        <div class="flex-1 bg-white -mt-8 rounded-t-3xl px-6 pt-8 pb-6">
            <div class="max-w-sm mx-auto">
                <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">欢迎使用</h2>
                <p class="text-gray-500 text-center mb-8">请登录您的账户</p>

                <!-- 微信一键登录 -->
                <button class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-4 px-6 rounded-xl mb-4 flex items-center justify-center transition-all duration-300">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 4.882-1.900 7.60.5.5-3.187-2.75-6.876-8.343-6.876z"/>
                    </svg>
                    微信一键登录
                </button>

                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-gray-200"></div>
                    <span class="px-4 text-gray-400 text-sm">或</span>
                    <div class="flex-1 border-t border-gray-200"></div>
                </div>

                <!-- 手机号登录 -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">手机号</label>
                        <input type="tel" placeholder="请输入手机号" 
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus outline-none transition-all duration-300">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">验证码</label>
                        <div class="flex space-x-3">
                            <input type="text" placeholder="请输入验证码" 
                                   class="flex-1 px-4 py-3 border border-gray-200 rounded-xl input-focus outline-none transition-all duration-300">
                            <button class="px-4 py-3 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition-colors duration-300 whitespace-nowrap">
                                获取验证码
                            </button>
                        </div>
                    </div>
                </div>

                <button class="w-full btn-primary text-white font-medium py-4 px-6 rounded-xl mt-6 mb-4">
                    登录
                </button>

                <!-- 管理员登录入口 -->
                <div class="text-center">
                    <button class="text-blue-600 text-sm hover:text-blue-700 transition-colors duration-300">
                        管理员登录
                    </button>
                </div>

                <!-- 用户协议 -->
                <div class="mt-8 text-center">
                    <p class="text-xs text-gray-400">
                        登录即表示同意
                        <a href="#" class="text-blue-600 hover:text-blue-700">《用户协议》</a>
                        和
                        <a href="#" class="text-blue-600 hover:text-blue-700">《隐私政策》</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部安全区 -->
    <div class="h-8 bg-white"></div>
</body>
</html>
