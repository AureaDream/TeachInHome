<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家教接单平台 - 原型展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tdesign-icons-view@0.2.1/dist/index.css" rel="stylesheet">
    <style>
        /* iPhone 15 Pro 尺寸: 393x852px */
        .phone-frame {
            width: 393px;
            height: 852px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: #000;
            padding: 8px;
            margin: 20px;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            background: #fff;
        }
        .prototype-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(393px, 1fr));
            gap: 40px;
            padding: 20px;
            justify-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .page-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0052d9;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">家教接单平台 - 原型展示</h1>
        <p class="text-center text-gray-600 mb-12">基于PRD文档设计的小程序界面原型，采用TDesign设计风格</p>
        
        <div class="prototype-grid">
            <!-- 登录注册页面 -->
            <div class="phone-frame relative">
                <div class="page-label">登录注册</div>
                <div class="phone-screen">
                    <iframe src="login.html" title="登录注册页面"></iframe>
                </div>
            </div>
            
            <!-- 订单列表页面 -->
            <div class="phone-frame relative">
                <div class="page-label">订单列表</div>
                <div class="phone-screen">
                    <iframe src="orders.html" title="订单列表页面"></iframe>
                </div>
            </div>
            
            <!-- 简历生成页面 -->
            <div class="phone-frame relative">
                <div class="page-label">简历生成</div>
                <div class="phone-screen">
                    <iframe src="resume.html" title="简历生成页面"></iframe>
                </div>
            </div>
            
            <!-- 论坛页面 -->
            <div class="phone-frame relative">
                <div class="page-label">论坛交流</div>
                <div class="phone-screen">
                    <iframe src="forum.html" title="论坛页面"></iframe>
                </div>
            </div>
            
            <!-- 个人中心页面 -->
            <div class="phone-frame relative">
                <div class="page-label">个人中心</div>
                <div class="phone-screen">
                    <iframe src="profile.html" title="个人中心页面"></iframe>
                </div>
            </div>
            
            <!-- 订单详情页面 -->
            <div class="phone-frame relative">
                <div class="page-label">订单详情</div>
                <div class="phone-screen">
                    <iframe src="order-detail.html" title="订单详情页面"></iframe>
                </div>
            </div>
            
            <!-- 管理员后台页面 -->
            <div class="phone-frame relative">
                <div class="page-label">管理后台</div>
                <div class="phone-screen">
                    <iframe src="admin.html" title="管理员后台页面"></iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
